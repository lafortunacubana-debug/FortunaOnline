<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Fortuna Cubana</title>
    
    <!-- Cargamos el CSS primero -->
    <link type="text/css" rel="stylesheet" href="styles.css">
    
    <style>
        /* Estilos críticos dentro del HTML para carga instantánea */
        body { background-color: #0f172a; margin: 0; overflow: hidden; }
        
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #0f172a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 99999; /* Máxima prioridad */
        }

        .logo-img {
            width: 120px; height: 120px;
            border-radius: 50%;
            animation: pulse 1.5s infinite ease-in-out;
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.2);
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.7; }
        }

        .loading-text {
            color: white;
            font-family: sans-serif;
            margin-top: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <!-- Asegúrate que logo1.png esté en la misma carpeta -->
        <img src="logo1.png" alt="Cargando..." class="logo-img" onerror="this.style.display='none'">
        <div class="loading-text">CARGANDO...</div>
    </div>

    <!-- EL CAMBIO CLAVE: Añadimos 'defer' para que no bloquee el renderizado -->
    <script defer type="application/javascript" src="composeApp.js"></script>

    <script>
        // Función para ocultar la pantalla cuando TODO esté listo
        window.addEventListener('load', function() {
            const loader = document.getElementById('loading-screen');
            
            // Esperamos un momento para que Compose se dibuje
            setTimeout(() => {
                loader.style.transition = "opacity 0.5s ease";
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    document.body.style.overflow = 'auto';
                }, 500);
            }, 1500); 
        });
    </script>
</body>
</html>
