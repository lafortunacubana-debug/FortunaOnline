<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Fortuna Cubana</title>
    <link type="text/css" rel="stylesheet" href="styles.css">
    
    <style>
        body { background-color: #0f172a; margin: 0; }
        
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0f172a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
        }

        .logo-container {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            position: relative;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* Animación de pulso */
            animation: pulse 1.8s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        .loading-text {
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <!-- Pantalla de carga personalizada -->
    <div id="loading-screen">
        <div class="logo-container">
            <img src="logo1.png" alt="Cargando..." class="logo-img">
        </div>
        <div class="loading-text">Cargando Fortuna...</div>
    </div>

    <!-- Tus scripts originales se mantienen igual -->
    <script type="application/javascript" src="composeApp.js"></script>

    <script>
        // Este código detecta cuándo Compose ha terminado de cargar
        window.addEventListener('load', function() {
            const loader = document.getElementById('loading-screen');
            // Un pequeño delay para asegurar que el canvas de Compose esté listo
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 600);
            }, 500);
        });
    </script>
</body>
</html>
